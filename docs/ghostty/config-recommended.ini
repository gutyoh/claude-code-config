# Ghostty Config: RECOMMENDED (SOTA 2026)
#
# Opinionated daily-driver config for software engineers on macOS.
# Philosophy: minimal overrides, productivity over aesthetics, no visual noise.
# Every line has a reason. Nothing is here "just because".
#
# Install: cp docs/ghostty/config-recommended.ini ~/.config/ghostty/config

# -- Font ---------------------------------------------------------------
# JetBrains Mono: best ligatures, Nerd Font icons, universal recognition.
# font-thicken compensates for macOS Retina rendering being too thin.
font-family = "JetBrainsMono Nerd Font Mono"
font-size = 14
font-thicken = true

# -- Theme --------------------------------------------------------------
# Auto light/dark follows macOS system appearance.
# Catppuccin: highest contrast-to-comfort ratio, actively maintained,
# consistent across all tools (Neovim, VS Code, bat, delta, etc).
theme = light:Catppuccin Latte,dark:Catppuccin Mocha

# -- Cursor -------------------------------------------------------------
# Block cursor: unambiguous position indicator.
# No blinking: reduces distraction, saves minor CPU cycles.
cursor-style = block
cursor-style-blink = false

# -- macOS --------------------------------------------------------------
# Tabs in titlebar: saves vertical space, native tab management.
# Option-as-Alt: required for terminal escape sequences (Alt+B, Alt+F, etc).
# display-p3: use the full color gamut of your Mac display.
macos-titlebar-style = tabs
macos-option-as-alt = true
window-save-state = always
window-colorspace = display-p3
confirm-close-surface = false
quit-after-last-window-closed = true
auto-update = download

# -- Shell Integration --------------------------------------------------
# ssh-env + ssh-terminfo: solves TERM=xterm-ghostty breakage on remotes
# without the blunt "term = xterm-256color" hack.
shell-integration-features = cursor,sudo,title,ssh-env,ssh-terminfo

# -- Clipboard ----------------------------------------------------------
# copy-on-select: select text = it's on your clipboard. No Cmd+C needed.
# trim-trailing-spaces: clean copies from wrapped lines.
copy-on-select = clipboard
clipboard-trim-trailing-spaces = true

# -- Mouse --------------------------------------------------------------
mouse-hide-while-typing = true

# -- Scrollback ---------------------------------------------------------
# 1M lines: ~50MB RAM. Enough for any log tail without memory bloat.
# (Default 10K is too small. 100M at ~5GB is wasteful.)
scrollback-limit = 1_000_000

# -- Window -------------------------------------------------------------
# Modest padding for breathing room. Balance centers content.
# resize-overlay = never: removes the distracting size overlay on resize.
window-padding-x = 8
window-padding-y = 6
window-padding-balance = true
resize-overlay = never

# -- Quick Terminal (system-wide dropdown) -------------------------------
# Cmd+` toggles a dropdown terminal from anywhere. Killer macOS feature.
# screen = mouse: follows you across monitors.
keybind = global:cmd+grave_accent=toggle_quick_terminal
quick-terminal-position = top
quick-terminal-screen = mouse
quick-terminal-animation-duration = 0.1

# -- Splits -------------------------------------------------------------
# iTerm2-like split keybindings. Cmd+D = vertical, Cmd+Shift+D = horizontal.
keybind = cmd+d=new_split:right
keybind = cmd+shift+d=new_split:down
keybind = cmd+opt+left=goto_split:left
keybind = cmd+opt+right=goto_split:right
keybind = cmd+opt+up=goto_split:up
keybind = cmd+opt+down=goto_split:down

# -- Navigation ---------------------------------------------------------
# Jump between shell prompts (requires shell integration).
# shift+enter sends literal newline for multi-line commands.
keybind = cmd+up=jump_to_prompt:-1
keybind = cmd+down=jump_to_prompt:1
keybind = shift+enter=text:\n
keybind = cmd+shift+,=reload_config
