# Ghostty Config: MAXIMALIST (Every Popular Option)
#
# Comprehensive config with every commonly-used setting enabled.
# Good starting point: copy this and DELETE what you don't need.
# It's easier to remove than to discover settings you didn't know existed.
#
# Install: cp docs/ghostty/config-maximalist.ini ~/.config/ghostty/config

# -- Font ---------------------------------------------------------------
font-family = "JetBrainsMono Nerd Font Mono"
font-size = 15
font-thicken = true
font-thicken-strength = 200
font-feature = +liga
font-feature = +calt
adjust-cell-height = 35%
bold-is-bright = true

# -- Theme --------------------------------------------------------------
theme = light:Catppuccin Latte,dark:Catppuccin Mocha

# -- Cursor -------------------------------------------------------------
cursor-style = block
cursor-style-blink = false
cursor-click-to-move = true
cursor-invert-fg-bg = true

# -- Transparency -------------------------------------------------------
background-opacity = 0.9
background-blur-radius = 25
minimum-contrast = 1.3

# -- macOS --------------------------------------------------------------
macos-titlebar-style = tabs
macos-option-as-alt = true
macos-auto-secure-input = true
window-save-state = always
window-colorspace = display-p3
confirm-close-surface = false
auto-update = download
auto-update-channel = stable

# -- Window -------------------------------------------------------------
window-padding-x = 12
window-padding-y = 10
window-padding-balance = true
window-padding-color = extend
window-theme = auto
resize-overlay = never
maximize = true

# -- Splits -------------------------------------------------------------
unfocused-split-opacity = 0.5

# -- Shell Integration --------------------------------------------------
shell-integration-features = cursor,sudo,title,ssh-env,ssh-terminfo

# -- Clipboard ----------------------------------------------------------
copy-on-select = clipboard
clipboard-trim-trailing-spaces = true
clipboard-read = allow
clipboard-write = allow
clipboard-paste-protection = false

# -- Mouse --------------------------------------------------------------
mouse-hide-while-typing = true
mouse-scroll-multiplier = 2
link-url = true

# -- Performance --------------------------------------------------------
scrollback-limit = 10_000_000
window-vsync = true

# -- Behavior -----------------------------------------------------------
quit-after-last-window-closed = true

# -- Custom Icon --------------------------------------------------------
macos-icon = custom-style
macos-icon-frame = plastic
macos-icon-ghost-color = #FFFFFF
macos-icon-screen-color = #1e1e2e

# -- Quick Terminal (system-wide dropdown) -------------------------------
keybind = global:cmd+grave_accent=toggle_quick_terminal
quick-terminal-position = top
quick-terminal-screen = mouse
quick-terminal-animation-duration = 0.1
quick-terminal-autohide = true

# -- Split Keybindings --------------------------------------------------
keybind = cmd+d=new_split:right
keybind = cmd+shift+d=new_split:down
keybind = cmd+opt+left=goto_split:left
keybind = cmd+opt+right=goto_split:right
keybind = cmd+opt+up=goto_split:up
keybind = cmd+opt+down=goto_split:down
keybind = cmd+shift+==equalize_splits
keybind = cmd+shift+enter=toggle_split_zoom

# -- Navigation Keybindings ---------------------------------------------
keybind = cmd+up=jump_to_prompt:-1
keybind = cmd+down=jump_to_prompt:1
keybind = cmd+right=text:\x05
keybind = cmd+left=text:\x01
keybind = opt+left=esc:b
keybind = opt+right=esc:f
keybind = shift+enter=text:\n

# -- Utility Keybindings ------------------------------------------------
keybind = cmd+shift+,=reload_config
keybind = cmd+shift+p=toggle_command_palette
keybind = cmd+shift+f=toggle_fullscreen
keybind = cmd+0=reset_font_size
keybind = cmd+shift+t=toggle_window_float_on_top
