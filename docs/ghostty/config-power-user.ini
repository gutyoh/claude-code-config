# Ghostty Config: POWER USER (tmux + Neovim Workflow)
#
# Zero chrome, maximum screen real estate. Hidden titlebar.
# Optimized for users who live in tmux and use Ghostty as a thin GPU-rendered shell.
# Includes tmux prefix keybindings for common operations.
#
# Install: cp docs/ghostty/config-power-user.ini ~/.config/ghostty/config

# -- Font ---------------------------------------------------------------
font-family = "JetBrainsMono Nerd Font Mono"
font-size = 14
font-style = medium
font-thicken = true
bold-is-bright = true

# -- Theme --------------------------------------------------------------
theme = Catppuccin Mocha

# -- Cursor -------------------------------------------------------------
cursor-style = block
cursor-style-blink = false

# -- macOS --------------------------------------------------------------
# Hidden titlebar: maximum terminal real estate, keeps rounded corners.
macos-titlebar-style = hidden
macos-option-as-alt = true
window-save-state = always
confirm-close-surface = false

# -- Window -------------------------------------------------------------
# Slight transparency + blur for depth without sacrificing readability.
background-opacity = 0.9
background-blur = 16
window-padding-balance = true
resize-overlay = never

# -- Shell Integration --------------------------------------------------
shell-integration-features = cursor,sudo,title,ssh-env,ssh-terminfo

# -- Clipboard ----------------------------------------------------------
# Allow read/write for tmux/neovim clipboard integration (OSC 52).
copy-on-select = clipboard
clipboard-trim-trailing-spaces = true
clipboard-read = allow
clipboard-write = allow

# -- Mouse --------------------------------------------------------------
mouse-hide-while-typing = true
mouse-scroll-multiplier = 2

# -- Performance --------------------------------------------------------
# Large scrollback for log tailing. 10M lines for heavy use.
scrollback-limit = 10_000_000

# -- Behavior -----------------------------------------------------------
quit-after-last-window-closed = true
auto-update = check

# -- Quick Terminal -----------------------------------------------------
keybind = global:cmd+grave_accent=toggle_quick_terminal
quick-terminal-position = top
quick-terminal-animation-duration = 0

# -- tmux Keybindings ---------------------------------------------------
# Assumes tmux prefix is Ctrl+a (\x01).
# Cmd+S -> tmux save-buffer
keybind = cmd+s=text:\x01\x73
# Cmd+B -> tmux zoom toggle
keybind = cmd+b=text:\x01\x7a

# -- Utility Keybindings ------------------------------------------------
keybind = shift+enter=text:\n
keybind = cmd+shift+,=reload_config
