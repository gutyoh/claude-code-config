# Ghostty Config: AESTHETIC (Transparent + Blur)
#
# Beautiful, riced setup with transparency and blur effects.
# Trade-off: slightly higher GPU usage and reduced readability.
# Best with a clean wallpaper behind the terminal.
#
# Install: cp docs/ghostty/config-aesthetic.ini ~/.config/ghostty/config

# -- Font ---------------------------------------------------------------
font-family = "JetBrainsMono Nerd Font Mono"
font-size = 15
font-thicken = true
font-thicken-strength = 200
adjust-cell-height = 35%

# -- Theme --------------------------------------------------------------
theme = light:rose-pine-dawn,dark:rose-pine

# -- Transparency -------------------------------------------------------
# Black background gives cleanest transparency look.
# 0.85 opacity: visible wallpaper without sacrificing too much readability.
# blur-radius 20: smooth frosted glass effect.
# minimum-contrast 1.3: ensures text remains legible over any wallpaper.
background = #000000
background-opacity = 0.85
background-blur-radius = 20
minimum-contrast = 1.3

# -- Cursor -------------------------------------------------------------
cursor-style = block
cursor-style-blink = false
cursor-invert-fg-bg = true

# -- macOS --------------------------------------------------------------
# transparent titlebar blends with the terminal background.
macos-titlebar-style = transparent
macos-option-as-alt = true
window-save-state = always
window-colorspace = display-p3
confirm-close-surface = false

# -- Window -------------------------------------------------------------
window-padding-x = 12
window-padding-y = 10
window-padding-balance = true
window-padding-color = extend
resize-overlay = never

# -- Splits -------------------------------------------------------------
unfocused-split-opacity = 0.5

# -- Shell Integration --------------------------------------------------
shell-integration-features = cursor,sudo,title,ssh-env,ssh-terminfo

# -- Clipboard ----------------------------------------------------------
copy-on-select = clipboard
clipboard-trim-trailing-spaces = true
clipboard-paste-protection = false

# -- Mouse --------------------------------------------------------------
mouse-hide-while-typing = true
mouse-scroll-multiplier = 2

# -- Behavior -----------------------------------------------------------
quit-after-last-window-closed = true
bold-is-bright = true

# -- Quick Terminal -----------------------------------------------------
keybind = global:cmd+grave_accent=toggle_quick_terminal
quick-terminal-position = top
quick-terminal-screen = mouse
quick-terminal-animation-duration = 0.1

# -- Keybindings --------------------------------------------------------
keybind = cmd+d=new_split:right
keybind = cmd+shift+d=new_split:down
keybind = shift+enter=text:\n
keybind = cmd+shift+,=reload_config
